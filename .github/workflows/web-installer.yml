name: Build & Deploy Web Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO and esptool
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -e esp32-2432s028r

      - name: Merge firmware binary
        run: |
          BUILD_DIR=".pio/build/esp32-2432s028r"
          BOOT_APP0=$(find . -path "*/boot_app0.bin" | head -1)
          if [ -z "$BOOT_APP0" ]; then
            echo "boot_app0.bin not found, skipping"
            esptool --chip esp32 merge-bin \
              -o static/firmware/esp32-2432s028r/merged.bin \
              --flash-mode dio \
              --flash-freq 40m \
              --flash-size 4MB \
              0x1000  "$BUILD_DIR/bootloader.bin" \
              0x8000  "$BUILD_DIR/partitions.bin" \
              0x10000 "$BUILD_DIR/firmware.bin"
          else
            esptool --chip esp32 merge-bin \
              -o static/firmware/esp32-2432s028r/merged.bin \
              --flash-mode dio \
              --flash-freq 40m \
              --flash-size 4MB \
              0x1000  "$BUILD_DIR/bootloader.bin" \
              0x8000  "$BUILD_DIR/partitions.bin" \
              0xe000  "$BOOT_APP0" \
              0x10000 "$BUILD_DIR/firmware.bin"
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp install.html _site/index.html
          cp -r static _site/static

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4