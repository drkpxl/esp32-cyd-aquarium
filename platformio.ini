; PlatformIO project configuration for ESP32 CYD Aquarium.
;
; The public release is focused on the ESP32-2432S028R / Cheap Yellow Display
; target. The codebase is adapted from Livegrid OpenMatrix, but this default
; environment builds the standalone CYD aquarium firmware.

[platformio]
default_envs = esp32-2432s028r

[env:esp32-2432s028r]
platform = espressif32
board = esp32dev
framework = arduino
board_build.filesystem = littlefs
build_unflags =
	-std=gnu++11
build_flags =
	-I include
	-DPANEL_CYD_TFT
	-DAQUARIUM_ONLY
	-DFIXED_ENVIRONMENT
	-DCYD_FRAMEBUFFER_RENDERER=0
	-DCYD_DOT_RENDERER=1
	-DCYD_TFT_ROTATION=2
	-DCYD_TFT_SWAP_BYTES=1
	-DCYD_TFT_TONE_CORRECTION=1
	-DCYD_TFT_TONE_CURVE_STRENGTH=150
	-DCYD_TFT_TONE_BLACK_THRESHOLD=2
	-DCYD_TFT_BACKGROUND_TONE_CURVE_STRENGTH=0
	-DCYD_TFT_FOREGROUND_TONE_CURVE_STRENGTH=0
	-DCYD_TFT_FOREGROUND_GAIN=165
	-DCYD_TFT_FOREGROUND_SATURATION=235
	-DCYD_REFERENCE_FRAME_MODE=0
	-DCYD_REFERENCE_FRAME_BRIGHTNESS=255
	-DCYD_PREVIEW_BRIGHTNESS=100
	-DCYD_WIFI_TIME=0
	-DCYD_SHOW_CLOCK=0
	-DCYD_NTP_RESYNC_INTERVAL_MS=21600000UL
	-DCYD_NTP_RETRY_INTERVAL_MS=300000UL
	-DCYD_WIFI_DISCONNECT_AFTER_NTP=1
	-DCYD_AUTONOMOUS_LIFE=1
	-DCYD_CURATED_BOOT_POPULATION=1
	-DCYD_RICH_CREATURE_MIX=1
	-DCYD_KEEP_CREATURES_ON_SCREEN=1
	-DCYD_KEEP_INSIDE_MARGIN_X=6
	-DCYD_KEEP_INSIDE_MARGIN_TOP=14
	-DCYD_KEEP_INSIDE_MARGIN_BOTTOM=12
	-DCYD_AUTONOMOUS_BOOT_MIN_MS=1500
	-DCYD_AUTONOMOUS_BOOT_MAX_MS=3500
	-DCYD_AUTONOMOUS_FOOD_MIN_MS=5500
	-DCYD_AUTONOMOUS_FOOD_MAX_MS=12000
	-DCYD_AUTONOMOUS_MAX_FOOD=3
	-DCYD_FIXED_HUMIDITY_PERCENT=50
	-DCYD_BACKGROUND_BRIGHTNESS=68
	-DCYD_BACKGROUND_BLACK_THRESHOLD=2
	-DCYD_FOREGROUND_BRIGHTNESS=235
	-DCYD_FOREGROUND_SATURATION=160
	-DCYD_LIGHT_SENSOR_SCREEN_DIAGNOSTIC=0
	-DCYD_LIGHT_SENSOR_DIAGNOSTIC=0
	-DCYD_LIGHT_SENSOR_DIAGNOSTIC_INTERVAL_MS=1000
	-DCYD_AUTO_BACKLIGHT=1
	-DCYD_AUTO_BACKLIGHT_SENSOR_PIN=34
	-DCYD_AUTO_BACKLIGHT_BRIGHT_RAW=10
	-DCYD_AUTO_BACKLIGHT_DARK_RAW=650
	-DCYD_AUTO_BACKLIGHT_MIN_PERCENT=38
	-DCYD_AUTO_BACKLIGHT_MAX_PERCENT=100
	-DCYD_AUTO_BACKLIGHT_READ_INTERVAL_MS=750
	-DCYD_AUTO_BACKLIGHT_STEP_PERCENT=4
	-DCYD_AUTO_BACKLIGHT_REPORT_INTERVAL_MS=10000
	-DCYD_STARTUP_SMOKE_TEST=0
	-DCYD_TOUCH_DEBUG=1
	-DCYD_PERF_DEBUG=1
	-DUSE_GFX_LITE
	-DCORE_DEBUG_LEVEL=0
	-DUSER_SETUP_LOADED
	-DILI9341_2_DRIVER
	-DTFT_INVERSION_OFF
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BL=21
	-DTFT_BACKLIGHT_ON=HIGH
	-DTOUCH_CS=33
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=16000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DUSE_HSPI_PORT
	-std=gnu++17
build_src_filter =
	+<*>
	-<main.cpp>
	+<main_cyd.cpp>
upload_speed = 921600
monitor_speed = 115200
lib_compat_mode = soft
lib_deps =
	Wire
	SPI
	FS
	bblanchon/ArduinoJson@^7.1.0
	https://github.com/drvkmr/GFX_Lite
	https://github.com/robjen/GFX_fonts
	sensirion/Sensirion I2C SCD4x@^0.4.0
	bodmer/TFT_eSPI
